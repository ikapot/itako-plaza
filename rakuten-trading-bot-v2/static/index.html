<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itako News-Trade V2 | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --bg-color: #050a14;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-blue: #00d2ff;
            --accent-green: #00ff88;
            --text-color: #e0e0e0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            background-image: radial-gradient(circle at 20% 30%, rgba(0, 210, 255, 0.05) 0%, transparent 40%);
        }
        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; letter-spacing: 2px; color: var(--accent-blue); }
        .status-badge { padding: 8px 16px; border-radius: 20px; font-size: 0.8rem; background: var(--glass-bg); border: 1px solid var(--glass-border); display: flex; align-items: center; gap: 8px; }
        .pulse { width: 8px; height: 8px; background-color: var(--accent-green); border-radius: 50%; box-shadow: 0 0 10px var(--accent-green); animation: pulse 2s infinite; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 25px; transition: 0.3s; }
        .card:hover { border-color: rgba(0, 210, 255, 0.3); transform: translateY(-5px); }
        .label { font-size: 0.75rem; color: #888; text-transform: uppercase; margin-bottom: 10px; }
        .value { font-family: 'Orbitron', sans-serif; font-size: 1.8rem; color: #fff; }
        .unit { font-size: 0.9rem; color: #666; margin-left: 5px; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>ITAKO V2 DASHBOARD</h1>
            <div class="status-badge"><div class="pulse"></div><span id="bot-mode">LOADING...</span></div>
        </header>
        <div class="grid">
            <div class="card"><div class="label">BTC Price</div><div class="value" id="btc-price">--</div></div>
            <div class="card"><div class="label">Equity Balance</div><div class="value" id="equity">--<span class="unit">JPY</span></div></div>
            <div class="card"><div class="label">Current Position</div><div class="value" id="position">--</div></div>
        </div>
    </div>
    <script>
        async function update() {
            try {
                const res = await fetch('/api/status');
                if (!res.ok) throw new Error('API Error');
                const data = await res.json();
                document.getElementById('bot-mode').innerText = data.mode;
                document.getElementById('btc-price').innerText = Number(data.last_price).toLocaleString();
                document.getElementById('equity').innerHTML = Number(data.equity).toLocaleString() + '<span class="unit">JPY</span>';
                document.getElementById('position').innerText = data.position || 'IDLE';
            } catch (e) {
                console.error(e);
                document.getElementById('bot-mode').innerText = 'ERROR';
            }
        }
        setInterval(update, 15000);
        update();
    </script>
</body>
</html>
