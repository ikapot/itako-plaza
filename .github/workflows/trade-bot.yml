name: 🤖 Auto Trade Bot (Rakuten Wallet)

on:
  schedule:
    # 毎日 0:00〜14:00 UTC (= 9:00〜23:00 JST), 30分ごと
    - cron: '0,30 0-14 * * *'
  workflow_dispatch:  # 手動実行にも対応

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Trigger Trade Cycle
        run: |
          echo "🕐 トレードサイクルを開始します: $(date '+%Y-%m-%d %H:%M:%S JST' --date='9 hours')"
          
          RESPONSE=$(curl -s -o /tmp/trade_response.json -w "%{http_code}" \
            -X POST "${{ secrets.VERCEL_TRADE_URL }}" \
            -H "Content-Type: application/json" \
            -H "x-trade-secret: ${{ secrets.TRADE_SECRET }}" \
            --max-time 30)
          
          echo "📊 HTTPステータス: $RESPONSE"
          echo "📋 レスポンス:"
          cat /tmp/trade_response.json | python3 -m json.tool || cat /tmp/trade_response.json
          
          if [ "$RESPONSE" != "200" ]; then
            echo "❌ トレードAPIの呼び出しに失敗しました (HTTP $RESPONSE)"
            exit 1
          fi
          
          echo "✅ トレードサイクル完了"
