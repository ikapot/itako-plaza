name: 📈 Itako Quants Trader 24/7

on:
  schedule:
    # 15分ごとに実行 (24時間体制)
    - cron: '*/15 * * * *'
  workflow_dispatch: # 手動ボタンでも実行可能

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ccxt pandas requests python-dotenv

      - name: 🚀 Run Trading Bot
        env:
          WALLET_API_KEY: ${{ secrets.WALLET_API_KEY }}
          WALLET_API_SECRET: ${{ secrets.WALLET_API_SECRET }}
          RAKUTEN_API_ID: ${{ secrets.RAKUTEN_API_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_PAT_GIST: ${{ secrets.GITHUB_PAT_GIST }}
          GIST_ID: ${{ secrets.GIST_ID }}
          DRY_RUN: false
        run: python advanced-trader/bot.py
