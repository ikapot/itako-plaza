name: 🏯 Itako QuantBot Crypto

on:
  schedule:
    - cron: '*/10 * * * *'  # 10分おきに実行 (GitHubの負荷制限に配慮)
  workflow_dispatch:        # 手動起動も可能

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          pip install -r advanced-trader/requirements.txt

      - name: 💹 Run QuantBot (One-Shot)
        env:
          WALLET_API_KEY: ${{ secrets.WALLET_API_KEY }}
          WALLET_API_SECRET: ${{ secrets.WALLET_API_SECRET }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_PAT_GIST: ${{ secrets.GITHUB_PAT_GIST }}
          GIST_ID: ${{ secrets.GIST_ID }}
          DRY_RUN: ${{ secrets.DRY_RUN }}  # "false" にすると実売買
        run: |
          cd advanced-trader
          python bot.py
